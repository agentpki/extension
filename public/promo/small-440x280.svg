<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 280" width="440" height="280">
  <!-- Chrome Web Store small promo tile — 440x280, REQUIRED.
       Single source of truth; pnpm icons renders to PNG. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b2e"/>
      <stop offset="100%" stop-color="#0c0a14"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="440" height="280" fill="url(#bg)"/>
  <!-- Atmospheric glow behind shield -->
  <circle cx="115" cy="140" r="120" fill="url(#glow)"/>

  <!-- AgentPKI shield mark at left -->
  <g transform="translate(70, 80)">
    <path
      d="M45 0 L90 14 L90 50 C90 75 70 95 45 100 C20 95 0 75 0 50 L0 14 Z"
      fill="url(#shield)"
      stroke="#5b21b6"
      stroke-width="1.5"
    />
    <path
      d="M22 72 L45 22 L68 72 L60 72 L55 60 L35 60 L30 72 Z M40 52 L50 52 L45 40 Z"
      fill="#ffffff"
    />
    <circle cx="74" cy="34" r="6" fill="#ffffff"/>
    <rect x="71" y="34" width="5" height="12" fill="#ffffff"/>
  </g>

  <!-- Right side: headline + 3 lines -->
  <g transform="translate(190, 90)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="0" y="0" font-size="28" font-weight="700" fill="#ffffff" letter-spacing="-0.5">
      Verify AI agents
    </text>
    <text x="0" y="32" font-size="28" font-weight="700" fill="#ffffff" letter-spacing="-0.5">
      in your browser.
    </text>
    <text x="0" y="68" font-size="13" fill="#a78bfa" letter-spacing="0.5">
      Free · Open source · Zero telemetry
    </text>
    <g transform="translate(0, 95)" font-size="12" fill="#9ca3af">
      <text x="0" y="0">
        <tspan fill="#22c55e">✓</tspan> Verified
        <tspan dx="14" fill="#fbbf24">!</tspan> Unverified
        <tspan dx="14" fill="#ef4444">⛔</tspan> Revoked
      </text>
    </g>
  </g>

  <!-- Bottom-right: agentpki.dev wordmark -->
  <text x="425" y="265" font-family="ui-monospace, monospace" font-size="10" fill="#6b7280" text-anchor="end">
    agentpki.dev
  </text>
</svg>
